<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destinations - TravelX</title>

<!-- Critical CSS -->
<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
font-size:24px;
font-weight:700;
color:#007bff;
}

.nav-links{
display:flex;
list-style:none;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:#333;
font-weight:500;
}

.destinations-page{
padding:60px 80px;
text-align:center;
}

#search{
margin-top:20px;
padding:12px;
width:300px;
border-radius:6px;
border:1px solid #ccc;
}

</style>

<!-- Correct CSS path -->
<link rel="stylesheet" href="/css/style.min.css">

</head>

<body>

<nav class="navbar">
<div class="logo">TravelX</div>

<ul class="nav-links">
<li><a href="/">Home</a></li>
<li><a href="/destinations">Destinations</a></li>
<li><a href="/packages">Packages</a></li>
<li><a href="/gallery">Gallery</a></li>
<li><a href="/contact">Contact</a></li>
</ul>
</nav>

<section class="destinations-page">

<h1>Explore Destinations</h1>

<input type="text" id="search" placeholder="Search destination...">

<div class="destination-grid">

<div class="destination-card">
<img src="/images/optimized/paris.jpg" loading="lazy" alt="Paris">
<h3>Paris</h3>
</div>

<div class="destination-card">
<img src="/images/optimized/bali.jpg" loading="lazy" alt="Bali">
<h3>Bali</h3>
</div>

<div class="destination-card">
<img src="/images/optimized/maldives.jpg" loading="lazy" alt="Maldives">
<h3>Maldives</h3>
</div>

<div class="destination-card">
<img src="/images/optimized/switzerland.jpg" loading="lazy" alt="Switzerland">
<h3>Switzerland</h3>
</div>

<div class="destination-card">
<img src="/images/optimized/dubai.jpg" loading="lazy" alt="Dubai">
<h3>Dubai</h3>
</div>

<div class="destination-card">
<img src="/images/optimized/japan.jpg" loading="lazy" alt="Japan">
<h3>Japan</h3>
</div>

</div>

</section>

<!-- Correct JS path -->
<script src="/js/script.js"></script>

</body>
</html>
